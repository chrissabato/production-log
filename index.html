<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg:       '#0f1117',
              surface:  '#1a1d27',
              border:   '#2a2d3a',
              accent:   '#4f8ef7',
              accentDk: '#3a6fd8',
              danger:   '#e05252',
              dangerDk: '#c03a3a',
              success:  '#3ecf8e',
              text:     '#e2e4ec',
              muted:    '#6b7090',
            },
          },
          fontFamily: {
            mono: ["'Courier New'", 'Courier', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    #status-dot.active {
      background: #3ecf8e;
      box-shadow: 0 0 6px #3ecf8e;
      animation: pulse 1.4s infinite;
    }
    #elapsed.inactive { color: #2a2d3a; }
    #toast {
      transform: translateX(-50%) translateY(60px);
      opacity: 0;
      transition: transform .25s ease, opacity .25s ease;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="bg-brand-bg text-brand-text min-h-screen flex flex-col items-center px-4 pt-8 pb-16">

<header class="w-full max-w-3xl flex items-center justify-between mb-8">
  <h1 class="text-xl font-bold tracking-wide">Production <span class="text-brand-accent">Log</span></h1>
  <div id="clock" class="font-mono text-sm text-brand-muted tracking-widest">--:--:--</div>
</header>

<!-- Status bar -->
<div id="status-bar" class="w-full max-w-3xl bg-brand-surface border border-brand-border rounded-xl px-5 py-3 flex items-center gap-3 mb-6">
  <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-brand-muted shrink-0 transition-colors"></div>
  <span id="status-text" class="text-sm text-brand-muted">Session not started</span>
</div>

<!-- Elapsed timer -->
<div id="elapsed" class="inactive block w-full max-w-3xl text-center font-mono text-7xl font-bold tracking-widest text-brand-success mb-6 leading-none transition-colors min-h-20">00:00:00</div>

<!-- Controls -->
<div id="controls" class="w-full max-w-3xl flex gap-3 mb-6 flex-wrap">
  <button id="btn-start"
    class="rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100 bg-brand-accent text-white hover:bg-brand-accentDk">Start</button>
  <button id="btn-log" disabled
    class="flex-1 min-w-[120px] rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100 bg-brand-surface text-brand-text border border-brand-border hover:bg-brand-border">+ Log Entry</button>
  <button id="btn-stop" disabled
    class="rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed disabled:active:scale-100 bg-brand-danger text-white hover:bg-brand-dangerDk">Stop &amp; Export</button>
</div>

<!-- Inline log form -->
<div id="log-form" class="hidden w-full max-w-3xl gap-2 mb-6">
  <input id="note-input" type="text" placeholder="Enter note…" maxlength="500" autocomplete="off"
    class="flex-1 bg-brand-surface border border-brand-accent rounded-lg px-4 py-2.5 text-brand-text text-sm outline-none focus:ring-2 focus:ring-brand-accent/25" />
  <button id="btn-save"
    class="whitespace-nowrap rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all active:scale-95 bg-brand-accent text-white hover:bg-brand-accentDk">Save</button>
  <button id="btn-cancel"
    class="rounded-lg px-5 py-2.5 text-sm font-semibold cursor-pointer transition-all active:scale-95 bg-brand-surface text-brand-muted border border-brand-border hover:bg-brand-border">Cancel</button>
</div>

<!-- Log table -->
<div id="log-wrap" class="w-full max-w-3xl">
  <div id="log-header" class="flex items-center justify-between mb-2">
    <h2 class="text-xs font-semibold text-brand-muted uppercase tracking-widest">Entries</h2>
    <span id="entry-count" class="text-xs text-brand-muted">0 entries</span>
  </div>
  <div id="log-table-wrap" class="overflow-x-auto border border-brand-border rounded-xl">
    <table id="log-table" class="w-full border-collapse text-sm">
      <thead>
        <tr>
          <th class="bg-brand-surface px-4 py-2.5 text-left font-semibold text-brand-muted text-xs uppercase tracking-wider border-b border-brand-border w-10">#</th>
          <th class="bg-brand-surface px-4 py-2.5 text-left font-semibold text-brand-muted text-xs uppercase tracking-wider border-b border-brand-border w-44">Timestamp</th>
          <th class="bg-brand-surface px-4 py-2.5 text-left font-semibold text-brand-muted text-xs uppercase tracking-wider border-b border-brand-border">Note</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="3"><div class="py-12 px-4 text-center text-brand-muted text-sm">No entries yet. Start a session and click &ldquo;+ Log Entry&rdquo; to begin.</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast" class="fixed bottom-6 left-1/2 bg-brand-success text-[#0a2a1a] font-bold text-sm px-5 py-2 rounded-full pointer-events-none">Entry saved</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  const state = {
    running:   false,
    startTime: null,
    entries:   [],        // { index, ts, note }
    timerID:   null,
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const $clock    = document.getElementById('clock');
  const $dot      = document.getElementById('status-dot');
  const $statusTx = document.getElementById('status-text');
  const $elapsed  = document.getElementById('elapsed');
  const $btnStart = document.getElementById('btn-start');
  const $btnLog   = document.getElementById('btn-log');
  const $btnStop  = document.getElementById('btn-stop');
  const $logForm  = document.getElementById('log-form');
  const $noteIn   = document.getElementById('note-input');
  const $btnSave  = document.getElementById('btn-save');
  const $btnCancel= document.getElementById('btn-cancel');
  const $logBody  = document.getElementById('log-body');
  const $entryCount = document.getElementById('entry-count');
  const $toast    = document.getElementById('toast');

  // ── Clock ─────────────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    $clock.textContent = now.toLocaleTimeString([], { hour12: false });
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Elapsed ───────────────────────────────────────────────────────────────
  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateElapsed() {
    if (!state.running) return;
    $elapsed.textContent = formatElapsed(Date.now() - state.startTime);
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  $btnStart.addEventListener('click', () => {
    state.running   = true;
    state.startTime = Date.now();
    state.entries   = [];
    renderTable();

    $dot.classList.add('active');
    $statusTx.textContent = 'Session running — started ' + new Date().toLocaleTimeString();
    $elapsed.textContent  = '00:00:00';
    $elapsed.classList.remove('inactive');

    $btnStart.disabled = true;
    $btnLog.disabled   = false;
    $btnStop.disabled  = false;

    state.timerID = setInterval(updateElapsed, 1000);
  });

  // ── Log form toggle ───────────────────────────────────────────────────────
  $btnLog.addEventListener('click', () => {
    $logForm.classList.remove('hidden');
    $logForm.classList.add('flex');
    $noteIn.value = '';
    $noteIn.focus();
    $btnLog.disabled = true;
  });

  function closeForm() {
    $logForm.classList.remove('flex');
    $logForm.classList.add('hidden');
    $btnLog.disabled = false;
  }

  $btnCancel.addEventListener('click', closeForm);

  $noteIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') $btnSave.click();
    if (e.key === 'Escape') closeForm();
  });

  // ── Save entry ────────────────────────────────────────────────────────────
  $btnSave.addEventListener('click', () => {
    const raw = $noteIn.value.trim();
    if (!raw) { $noteIn.focus(); return; }

    const now = new Date();
    state.entries.push({
      index: state.entries.length + 1,
      ts:    now,
      note:  raw,
    });

    renderTable();
    closeForm();
    showToast();
  });

  // ── Render table ──────────────────────────────────────────────────────────
  function fmtTs(d) {
    return d.toLocaleDateString([], { month:'2-digit', day:'2-digit', year:'numeric' })
      + '  '
      + d.toLocaleTimeString([], { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function renderTable() {
    $entryCount.textContent = state.entries.length + (state.entries.length === 1 ? ' entry' : ' entries');

    if (state.entries.length === 0) {
      $logBody.innerHTML = '<tr><td colspan="3"><div class="py-12 px-4 text-center text-brand-muted text-sm">No entries yet. Click &ldquo;+ Log Entry&rdquo; to begin.</div></td></tr>';
      return;
    }

    $logBody.innerHTML = [...state.entries].reverse().map(e =>
      `<tr class="border-b border-brand-border last:border-b-0 hover:bg-brand-surface transition-colors">
        <td class="px-4 py-2.5 text-right text-brand-muted text-xs w-10">${e.index}</td>
        <td class="px-4 py-2.5 font-mono text-xs text-brand-muted whitespace-nowrap w-44">${fmtTs(e.ts)}</td>
        <td class="px-4 py-2.5 break-words">${escHtml(e.note)}</td>
      </tr>`
    ).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Stop & export ─────────────────────────────────────────────────────────
  $btnStop.addEventListener('click', () => {
    if (!state.running) return;

    clearInterval(state.timerID);
    state.running = false;

    $dot.classList.remove('active');
    const dur = formatElapsed(Date.now() - state.startTime);
    $statusTx.textContent = `Session ended — duration ${dur}`;
    $elapsed.classList.add('inactive');

    $btnStart.disabled = false;
    $btnLog.disabled   = true;
    $btnStop.disabled  = true;
    closeForm();

    exportCSV();
  });

  function exportCSV() {
    const rows = [
      ['#', 'Timestamp', 'Elapsed (s)', 'Note'],
      ...state.entries.map(e => [
        e.index,
        e.ts.toISOString(),
        ((e.ts - state.startTime) / 1000).toFixed(1),
        e.note,
      ])
    ];

    const csv = rows.map(r =>
      r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
    ).join('\r\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0,19).replace(/[:T]/g, '-');
    a.href     = url;
    a.download = `production-log-${date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast() {
    clearTimeout(toastTimer);
    $toast.classList.add('show');
    toastTimer = setTimeout(() => $toast.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
